org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.overridePathCheck=true

# This project's path contains non-ASCII (Arabic) characters. The
# out-of-process Kotlin compile daemon fails to launch under that path on
# this machine ("Failed connecting to the daemon in 4 retries"), and its
# fallback then mis-resolves source files. Forcing in-process compilation
# (runs inside the Gradle daemon's own JVM, no extra subprocess spawn)
# avoids that failure path entirely.
kotlin.compiler.execution.strategy=in-process
